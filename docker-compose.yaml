services:
  postgres:
    image: postgres:18
    container_name: postgres
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: user
      POSTGRES_DB: wn_db
      PGDATA: /var/lib/postgresql/data
    ports:
      - '127.0.0.1:5432:5432'
    volumes:
      - ./volumes/db:/var/lib/postgresql/data
  redis:
    image: redis:latest
    container_name: redis
    ports:
      - '127.0.0.1:6379:6379'
    volumes:
      - ./volumes/redis-data:/var/lib/redis
    restart: unless-stopped
volumes:
  redis-data:
    driver: local