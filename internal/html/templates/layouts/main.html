<!doctype html>
<html lang="ru">
<head>
    <title>MyTask</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="shortcut icon" href="/static/images/favicon.png" type="image/x-icon">
    <!-- Encoding web-page -->
    <meta charset="utf-8">
    <!-- Setting viewport -->
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <!-- Bootstrap CSS (jsDelivr CDN) -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <!-- Bootstrap Bundle JS (jsDelivr CDN) -->
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="/static/css/style.css">

</head>
<body>
<div class="place-img">
    <img src="/static/images/selfie2.png" class="img-place" alt="img-place">
</div>
<img src="/static/images/sun.png" class="sun__img" alt="Sun">

<div class="container sidebar-left">
    <div class="row">
        <div class="sidebar col-sm-auto">
            <div class="d-flex flex-column flex-nowrap sticky-top sidebar-stack">
                <ul class="nav nav-pills nav-flush flex-sm-column flex-row flex-nowrap mb-auto mx-auto text-center align-items-center">
                    <li class="nav-item">
                        <a href="/" class="nav-link py-3 px-2">
                            <i class="bi-house fs-1"></i>
                        </a>
                    </li>

                </ul>

                <div class="dropdown">
                    <a href="#" class="d-flex align-items-center justify-content-center p-3 link-dark text-decoration-none dropdown-toggle"
                       id="dropdownUser3" data-bs-toggle="dropdown" aria-expanded="false">
                        <img src="{{ .User.PathImage }}" class="user-avatar" alt="">
                    </a>

                    <ul class="dropdown-menu text-small shadow" aria-labelledby="dropdownUser3">
                        <li>
                            <a class="dropdown-item" href="#" data-bs-toggle="modal" data-bs-target="#settingsModal">
                                <i class="bi-gear"></i> Settings
                            </a>
                        </li>
                        <li>
                            <form method="post" action="/user/logout">
                                <button type="submit" class="dropdown-item logout-btn">
                                    <i class="bi-box-arrow-right"></i> Logout
                                </button>
                            </form>
                        </li>
                    </ul>
                    <div class="extra-info">
                        <p class="name-profile">{{ .User.Name }}</p>
                        <p class="email-profile">{{ .User.Email }}</p>
                    </div>
                </div>
                <div class="lists-panel" id="listsPanel">
                    <div class="lists-title">My Lists</div>

                    <div class="lists-scroll">
                        {{ if .List }}
                            {{ range .List }}
                                <div class="list-row {{ if eq .ID $.ActiveListID }}is-active{{ end }}">
                                    <a class="list-row__link" href="/list/{{ .ID }}">
                                        <span class="list-row__name">{{ .Name }}</span>
                                    </a>

                                    <form method="post" action="/list/{{ .ID }}" class="list-row__delete-form">
                                        <input type="hidden" name="list_id" value="{{ .ID }}">
                                        <input type="hidden" name="action" value="delete_list">
                                        <button type="submit" class="list-row__delete" aria-label="Delete list">
                                            <i class="bi-trash3"></i>
                                        </button>
                                    </form>
                                </div>
                            {{ end }}
                        {{ end }}
                    </div>

                    <div class="lists-actions">
                        <button type="button" class="sidebar-action-btn sidebar-action-btn--cancel" id="cancelDeleteListsBtn">
                            Cancel
                        </button>
                        <button type="button" class="sidebar-action-btn sidebar-action-btn--delete" id="toggleDeleteListsBtn">
                            Delete List
                        </button>
                    </div>
                </div>

            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="settingsModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">

            <div class="modal-header border-0">
                <h5 class="modal-title">Settings</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>

            <div class="modal-body">
                <form method="post" action="/user/settings" enctype="multipart/form-data" class="settings-form-avatar">
                    <div class="mb-4 text-center">
                        <img src="{{ .User.PathImage }}" class="settings-avatar mb-3" alt="Avatar">
                        <div>
                            <label for="avatarInput" class="form-label d-block">Change Avatar</label>
                            <input type="file" class="form-control d-inline-block w-auto" id="avatarInput" name="avatar" accept="image/*">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label for="userNameInput" class="form-label">Change Name</label>
                        <input
                                type="text"
                                class="form-control"
                                id="userNameInput"
                                name="user_name"
                                placeholder="{{ .User.Name }}"
                                maxlength="50"
                        >
                    </div>

                    <div class="mb-3">
                        <label for="changePasswordLink" class="form-label">Change Password</label>
                        <div>
                            <a href="/user/change-password" id="changePasswordLink" class="settings-link">
                                Go to password change <i class="bi-box-arrow-up-right"></i>
                            </a>
                        </div>
                    </div>

                    <div class="d-flex justify-content-end mt-4">
                        <button type="submit" class="btn btn-register">
                            Save Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{{ embed }}
</body>
<script src="/static/js/index.js"></script>
</html>
