<!doctype html>
<html lang="en">
<head>
  <title>Registration | MyTasks</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="shortcut icon" href="/static/images/favicon.png" type="image/x-icon">
  
  <!-- Encoding & Viewport -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Bootstrap CSS & Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- Bootstrap Bundle JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <img src="/static/images/sun.png" class="sun__img" alt="Sun">

  <div class="register-container">
    <div class="register-card">
      <h1 class="register-title">Create Account</h1>

      <form method="post">

          <div class="mb-4">
              <label class="form-label">Username</label>
              <input type="text" name="user-name" class="form-control" required>
          </div>

          <div class="mb-4">
              <label class="form-label">Surname</label>
              <input type="text" name="user-surname" class="form-control" required>
          </div>

          <div class="mb-4">
              <label class="form-label">Email</label>
              <input type="email" name="user-email"  class="form-control is-invalid" id="validationEmail" aria-describedby="validationEmailFeedback" required>
              <div id="validationEmailFeedback" class="invalid-feedback">
                  {{ .Email }}
              </div>
          </div>

          <div class="mb-4">
              <label for="validationPassword" class="form-label">Password</label>
              <input type="password" name="user-password"  class="form-control is-invalid" id="validationPassword" aria-describedby="validationPasswordFeedback" required>
              <div id="validationPasswordFeedback" class="invalid-feedback">
                  {{ .Password }}
              </div>
          </div>


        <button type="submit" class="btn btn-register w-100">Register</button>

      </form>

      <div class="text-center mt-4">
        <p>Already have an account? <a href="/user/login" class="login-link">Log in</a></p>
      </div>
    </div>
  </div>

</body>
</html>
