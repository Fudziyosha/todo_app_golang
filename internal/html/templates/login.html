<!doctype html>
<html lang="en">
<head>
  <title>Log In | MyTasks</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  
  <!-- Encoding & Viewport -->
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  
  <!-- Bootstrap CSS & Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  
  <!-- Bootstrap Bundle JS -->
  <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="../../../static/css/style.css">

</head>
<body>
  <img src="../../../static/images/sun.png" class="sun__img" alt="Sun">

  <div class="login-container">
    <div class="login-card">
      <h1 class="login-title">Welcome Back</h1>

      <form method="post">
        <div class="mb-4">
          <input type="email" name="user-email" class="form-control" placeholder="Email" required>
        </div>

        <div class="mb-4">
          <input type="password" name="user-password" class="form-control" placeholder="Password" required>
        </div>

        <button type="submit" class="btn btn-login w-100">Log In</button>
      </form>

      <div class="text-center mt-4">
        <p>Don't have an account? <a href="/user/register" class="register-link">Register</a></p>
      </div>
    </div>
  </div>

</body>
</html>
